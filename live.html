<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sage Import Live Check</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2528;
        --muted: #647174;
        --line: #d9e0df;
        --sage: #0f6b5b;
        --canvas: #f4f7f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: linear-gradient(135deg, rgba(15, 107, 91, 0.12), transparent 34rem), var(--canvas);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 620px);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(31, 49, 54, 0.12);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 10px;
        color: var(--sage);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1;
      }

      .status {
        display: inline-flex;
        margin-top: 22px;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(15, 107, 91, 0.1);
        color: var(--sage);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Sage Import Checker</p>
      <h1>Tool is live.</h1>
      <p>If you can see this at sage-import.27tools.co, the custom domain is reaching the Cloudflare Worker.</p>
      <p class="status">Live check page loaded</p>
    </main>
  </body>
</html>
